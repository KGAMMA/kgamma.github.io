<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio Poster</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #00f0ff;
      --c2: #7b2fff;
      --c3: #ff2d78;
      --glass: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --text: #e8f0ff;
      --muted: rgba(232,240,255,0.38);
    }

    html, body {
      width: 100%; min-height: 100%;
      background: #010814;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 55% at 15% 8%,  rgba(123,47,255,.38) 0%, transparent 58%),
        radial-gradient(ellipse 60% 45% at 88% 18%,  rgba(0,240,255,.22) 0%, transparent 52%),
        radial-gradient(ellipse 75% 55% at 55% 95%,  rgba(255,45,120,.22) 0%, transparent 58%),
        radial-gradient(ellipse 50% 40% at 80% 70%,  rgba(123,47,255,.15) 0%, transparent 50%),
        linear-gradient(170deg, #010814 0%, #050d24 45%, #080820 100%);
      animation: bgPulse 14s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0%   { filter: hue-rotate(0deg)   brightness(1);    }
      50%  { filter: hue-rotate(18deg)  brightness(1.07); }
      100% { filter: hue-rotate(-12deg) brightness(.96);  }
    }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.045'/%3E%3C/svg%3E");
      pointer-events: none; opacity: .7;
    }
    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,240,255,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,.028) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    /* ── POSTER WRAPPER (A2 ratio) ── */
    .poster {
      position: relative; z-index: 1;
      width: min(100vw, calc(100vh / 1.4142));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(18px,4vw,52px) clamp(16px,4vw,52px) clamp(20px,4vw,52px);
      gap: clamp(14px,2.5vw,28px);
    }

    /* ── TOP ROW: 5 thumbnails ── */
    .strip-row {
      display: flex;
      gap: clamp(5px,1.1vw,11px);
      opacity: 0;
      animation: riseIn .8s .1s cubic-bezier(.16,1,.3,1) forwards;
    }

    .thumb {
      flex: 1;
      aspect-ratio: 3/4;
      position: relative;
      overflow: visible;        /* allow scale overflow */
      border-radius: clamp(5px,.9vw,10px);
      cursor: pointer;
      /* inner clip via inner element */
    }

    /* clipped inner shell */
    .thumb-inner {
      position: absolute; inset: 0;
      overflow: hidden;
      border-radius: inherit;
      border: 1px solid var(--border);
      background: var(--glass);
      transition: transform .45s cubic-bezier(.16,1,.3,1);
    }

    .thumb:hover .thumb-inner {
      transform: scale(1.24) translateY(-5%);
      z-index: 20;
    }

    .thumb img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* number badge */
    .thumb .num {
      position: absolute; top: clamp(4px,.7vw,7px); left: clamp(4px,.7vw,7px);
      width: clamp(15px,1.8vw,20px); height: clamp(15px,1.8vw,20px);
      border-radius: 50%;
      background: rgba(0,0,0,.55);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: clamp(6px,.85vw,9px);
      color: var(--muted); z-index: 3;
    }

    /* placeholder icon */
    .thumb .ph {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px;
      color: var(--muted);
      font-size: clamp(7px,.9vw,10px);
      letter-spacing: .1em; text-transform: uppercase;
    }
    .thumb .ph svg { width: clamp(16px,2.2vw,26px); height: clamp(16px,2.2vw,26px); opacity:.35; }
    .thumb img ~ .ph { display: none; }

    /* upload hint — hidden on hover, only show on empty placeholder */
    .thumb .hint { display: none; }

    /* ── MIDDLE: BIG MAIN IMAGE ── */
    .main-wrap {
      display: flex;
      flex-direction: column;
      gap: clamp(8px,1.4vw,14px);
      opacity: 0;
      animation: riseIn .85s .28s cubic-bezier(.16,1,.3,1) forwards;
    }

    /* poster eyebrow row */
    .eyebrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .eyebrow-left {
      display: flex; align-items: center; gap: clamp(6px,1vw,12px);
    }

    .tag {
      font-size: clamp(7px,.9vw,10px);
      letter-spacing: .22em; text-transform: uppercase;
      padding: clamp(2px,.4vw,4px) clamp(6px,1vw,10px);
      border-radius: 100px;
    }
    .tag--cyan  { border: 1px solid rgba(0,240,255,.4); color: var(--c1); }
    .tag--pink  { border: 1px solid rgba(255,45,120,.4); color: var(--c3); }

    .eyebrow-year {
      font-size: clamp(7px,.9vw,10px);
      letter-spacing: .18em;
      color: var(--muted);
    }

    /* big title over image */
    .poster-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px,7vw,88px);
      letter-spacing: .06em;
      line-height: .9;
      background: linear-gradient(100deg, #fff 0%, rgba(255,255,255,.55) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      pointer-events: none;
    }

    .main-slot {
      position: relative;
      width: 100%;
      aspect-ratio: 4/5;
      border-radius: clamp(10px,1.6vw,22px);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--glass);
      cursor: pointer;
    }

    /* corner brackets */
    .main-slot .corner {
      position: absolute;
      width: clamp(14px,2.2vw,26px); height: clamp(14px,2.2vw,26px);
      z-index: 5; pointer-events: none;
    }
    .corner--tl { top:8px; left:8px;  border-top:1.5px solid var(--c1); border-left:1.5px solid var(--c1); }
    .corner--tr { top:8px; right:8px; border-top:1.5px solid var(--c1); border-right:1.5px solid var(--c1); }
    .corner--bl { bottom:8px; left:8px;  border-bottom:1.5px solid var(--c1); border-left:1.5px solid var(--c1); }
    .corner--br { bottom:8px; right:8px; border-bottom:1.5px solid var(--c1); border-right:1.5px solid var(--c1); }

    /* glow ring */
    .main-slot::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(135deg, rgba(0,240,255,.07) 0%, transparent 45%),
        linear-gradient(315deg, rgba(123,47,255,.07) 0%, transparent 45%);
      z-index: 1; pointer-events: none;
    }

    .pulse-ring {
      position: absolute; inset: -1px;
      border-radius: inherit;
      border: 1px solid var(--c1);
      opacity: 0; pointer-events: none; z-index: 6;
      animation: pulse 3.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{opacity:0;transform:scale(1)} 50%{opacity:.28;transform:scale(1.004)}
    }

    .main-slot img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform .6s cubic-bezier(.16,1,.3,1);
      z-index: 2;
    }
    .main-slot:hover img { transform: scale(1.04); }

    .main-slot .ph {
      position: absolute; inset: 0; z-index: 3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: clamp(8px,1.4vw,16px);
    }
    .main-slot .ph svg {
      width: clamp(28px,5vw,56px); height: clamp(28px,5vw,56px); opacity:.2;
    }
    .main-slot .ph p {
      font-size: clamp(9px,1.1vw,12px);
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--muted);
    }
    .main-slot .ph .sub {
      font-size: clamp(7px,.9vw,10px);
      color: rgba(255,255,255,.18); letter-spacing: .15em;
    }
    .main-slot img ~ .ph { display: none; }

    .main-slot .hint { display: none; }

    /* ── BOTTOM ROW: poster metadata bar ── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: clamp(8px,1.4vw,16px);
      opacity: 0;
      animation: riseIn .8s .45s cubic-bezier(.16,1,.3,1) forwards;
    }

    .meta-left {
      display: flex; align-items: center; gap: clamp(8px,1.4vw,18px);
    }

    .meta-label {
      font-size: clamp(7px,.85vw,9px);
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--muted);
    }

    .meta-divider {
      width: 1px; height: clamp(10px,1.5vw,16px);
      background: var(--border);
    }

    .meta-num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(9px,1.1vw,12px);
      color: rgba(255,255,255,.22);
      letter-spacing: .1em;
    }

    .live-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: clamp(7px,.85vw,9px);
      letter-spacing: .18em; text-transform: uppercase;
      color: rgba(255,255,255,.28);
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #00ff88; box-shadow: 0 0 7px #00ff88;
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── ANIMATIONS ── */
    @keyframes riseIn {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0);    }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 420px) {
      .strip-row { gap: 4px; }
      .eyebrow-year { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grid"></div>

  <div class="poster">

    <!-- ① TOP: 5 THUMBNAILS -->
    <div class="strip-row">
      <!-- slots 1-5 -->
      <div class="thumb" onclick="upload(this)">
        <div class="thumb-inner">
          <div class="ph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="hint">+</div>
        </div>
        <div class="num">01</div>
        <input type="file" accept="image/*" style="display:none" onchange="loadImg(event,this.closest('.thumb'))"/>
      </div>

      <div class="thumb" onclick="upload(this)">
        <div class="thumb-inner">
          <div class="ph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="hint">+</div>
        </div>
        <div class="num">02</div>
        <input type="file" accept="image/*" style="display:none" onchange="loadImg(event,this.closest('.thumb'))"/>
      </div>

      <div class="thumb" onclick="upload(this)">
        <div class="thumb-inner">
          <div class="ph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="hint">+</div>
        </div>
        <div class="num">03</div>
        <input type="file" accept="image/*" style="display:none" onchange="loadImg(event,this.closest('.thumb'))"/>
      </div>

      <div class="thumb" onclick="upload(this)">
        <div class="thumb-inner">
          <div class="ph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="hint">+</div>
        </div>
        <div class="num">04</div>
        <input type="file" accept="image/*" style="display:none" onchange="loadImg(event,this.closest('.thumb'))"/>
      </div>

      <div class="thumb" onclick="upload(this)">
        <div class="thumb-inner">
          <div class="ph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
          <div class="hint">+</div>
        </div>
        <div class="num">05</div>
        <input type="file" accept="image/*" style="display:none" onchange="loadImg(event,this.closest('.thumb'))"/>
      </div>
    </div>

    <!-- ② MIDDLE: BIG MAIN IMAGE + title -->
    <div class="main-wrap">
      <!-- eyebrow -->
      <div class="eyebrow">
        <div class="eyebrow-left">
          <span class="tag tag--cyan">Featured</span>
          <span class="tag tag--pink">2026</span>
        </div>
        <span class="eyebrow-year">VOL.01 — EDITION</span>
      </div>

      <!-- big decorative type -->
      <div class="poster-title">WORK</div>

      <!-- main image slot -->
      <div class="main-slot" onclick="upload(this)">
        <div class="corner corner--tl"></div>
        <div class="corner corner--tr"></div>
        <div class="corner corner--bl"></div>
        <div class="corner corner--br"></div>
        <div class="pulse-ring"></div>
        <div class="ph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width=".9"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8" cy="8" r="2"/><path d="M22 14l-6-6L4 22"/></svg>
          <p>Main Image</p>
          <p class="sub">Click to upload</p>
        </div>
        <div class="hint">Upload Image</div>
        <input type="file" accept="image/*" style="display:none" onchange="loadImg(event,this.closest('.main-slot'))"/>
      </div>
    </div>

    <!-- ③ BOTTOM META BAR -->
    <div class="meta-bar">
      <div class="meta-left">
        <span class="meta-label">Portfolio</span>
        <div class="meta-divider"></div>
        <span class="meta-label">Selected Works</span>
        <div class="meta-divider"></div>
        <span class="meta-num">© 2026</span>
      </div>
      <div class="live-dot">
        <div class="dot"></div>
        <span>Available</span>
      </div>
    </div>

  </div>

  <script>
    function upload(el) {
      el.querySelector('input[type="file"]').click();
    }

    function loadImg(e, slot) {
      const file = e.target.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const prev = slot.querySelector('img');
      if (prev) prev.remove();
      const img = Object.assign(document.createElement('img'), { src: url });

      // for .thumb, inject into .thumb-inner
      const inner = slot.querySelector('.thumb-inner');
      if (inner) inner.prepend(img);
      else slot.prepend(img);
    }
  </script>
</body>
</html>
